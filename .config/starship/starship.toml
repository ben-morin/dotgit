"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

add_newline = true

format = """
\\[$username$hostname\\]$directory${custom.char_user}${custom.char_root}
"""
right_format = """$all"""

[username]
disabled = false
format = "[$user](white)"
show_always = true

[hostname]
ssh_symbol = "¯¼ü "
disabled = false
ssh_only = false
format = "[@$hostname](white)"

[directory]
truncation_length = 7
truncation_symbol = "¾░çİ/"
truncate_to_repo = true
style = 'bold cyan'
read_only_style = 'red'
read_only = '[´æû]'
format = '\[[$path]($style)\][$read_only]($read_only_style)'

[character]
disabled = true

[custom.char_user]
description = "Custom character for non-root user"
when = 'whoami | grep -vq root'
format = '[% ](bright white)'

[custom.char_root]
description = "Custom character for root user"
when = 'whoami | grep -q root'
format = '[# ](bright white)'

[git_branch]
format = '[$symbol$branch ]($style)'
symbol = "´Éİ "
truncation_length = 25
truncation_symbol = '¾░çİ'

[git_status]
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
staged = '[++\($count\)](green)'

[git_commit]
tag_symbol = ' ´ÉÆ '
commit_hash_length = 4

[cmd_duration]
min_time = 500
show_milliseconds = true
format = '[$duration](bold yellow)'

